<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistente Raid On St. Nazaire</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #919191;
            color: white;
            display:grid ;
            justify-content: center;
            gap: 20px;
            padding-top: 50px;
        }

        .panel {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            box-shadow: 0 0 10px black;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            margin-bottom: 15px;
        }

        .resultado {
            font-size: 22px;
            margin-top: 10px;
        }

        .blanco { color: white; }
        .azul { color: #4da6ff; }
        .rojo { color: #ff4d4d; }
    </style>
</head>
<body>
Asistente Raid On St. Nazaire
    <!-- PANEL 1 -->
    <div class="panel">
        <button onclick="dr()">dr</button>
        <div class="resultado" id="resDr"></div>
    </div>
    
    
    

    <!-- PANEL 2 -->
    <div class="panel">
        <button onclick="DR()">DR</button>
        <div class="resultado" id="resDR"></div>
    </div>

    <!-- PANEL 3 -->
    <div class="panel">
        <button onclick="TRIADA()">TRIADA</button>
        <div class="resultado" id="resTriada"></div>
    </div>

<script>
    function dado() {
        return Math.floor(Math.random() * 6) + 1;
    }

    function dr() {
        const blanco = dado();
        document.getElementById("resDr").innerHTML =
            `<span class="blanco">🎲 ${blanco}</span>`;
    }

    function DR() {
        const blanco = dado();
        const azul = dado();
        const suma = blanco + azul;

        document.getElementById("resDR").innerHTML =
            `<span class="azul">🔵 ${azul}</span> +
             <span class="blanco">⚪ ${blanco}</span><br>
             = <strong>${suma}</strong>`;
    }

    function TRIADA() {
        const rojo = dado();
        const azul = dado();
        const blanco = dado();

        document.getElementById("resTriada").innerHTML =
            `<span class="rojo">🔴 ${rojo}</span> | 
             <span class="azul">${azul}</span><span class="blanco">${blanco}</span>`;
    }
</script>

</body>
</html>
